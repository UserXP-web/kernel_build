name: Build Android AOSP Kernel (AnyKernel3)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib \
            gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 lld llvm wget

      # Προσθήκη GitHub Cache για το ccache
      - name: Setup Kernel ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Download Clang Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains
          echo "Download clang..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz" -o clang.tar.gz
          echo "Done. Extracting..."
          tar -xzf clang.tar.gz -C clang/ && rm clang.tar.gz
          echo "Done."

      - name: Clone Kernel Source and AnyKernel3
        run: |
          git clone --depth=1 "https://github.com/UserXP-web/Zen-ItsuKernel-Garnet" -b Zen-Itsu-Garnet android/common
          git clone --depth=1 "https://github.com/osm0sis/AnyKernel3" AnyKernel3

      - name: Compile Kernel Image
        run: |
          cd android/common
          make clean
          make mrproper
          rm -rf out
          
          # Δημιουργία αυτόματων symlinks για το ccache (Ο σωστός τρόπος για Android Kbuild)
          mkdir -p $GITHUB_WORKSPACE/ccache_bin
          ln -s $(which ccache) $GITHUB_WORKSPACE/ccache_bin/clang
          ln -s $(which ccache) $GITHUB_WORKSPACE/ccache_bin/clang++
          ln -s $(which ccache) $GITHUB_WORKSPACE/ccache_bin/ld.lld
          
          # Προσθήκη των ccache symlinks ΠΡΩΤΑ στο PATH και μετά του κανονικού Clang
          export PATH="$GITHUB_WORKSPACE/ccache_bin:$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          
          # Ρυθμίσεις ccache
          ccache -M 5G
          ccache -z
                    
          BUILD_ARGS="
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            STRIP=llvm-strip \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            O=out
          "
          
          make $BUILD_ARGS gki_defconfig
          
          if [ -f arch/arm64/configs/vendor/garnet_GKI.config ]; then
            ARCH=arm64 scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/garnet_GKI.config
          fi
          
          make -j$(nproc --all) $BUILD_ARGS KCFLAGS="-Wno-frame-larger-than" Image dtbs
          
          ccache -s

      - name: Prepare AnyKernel3 Files & Inject Properties
        run: |
          if [ ! -f android/common/out/arch/arm64/boot/Image ]; then
            echo "Error: Kernel Image was not compiled!"
            exit 1
          fi
          
          # Αντιγραφή Kernel Image και DTBs στο AnyKernel3
          cp android/common/out/arch/arm64/boot/Image AnyKernel3/
          if [ -d android/common/out/arch/arm64/boot/dts ]; then
            find android/common/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} AnyKernel3/ \;
          fi
          
          # ΑΥΤΟΜΑΤΕΣ ΑΛΛΑΓΕΣ ΣΤΟ anykernel.sh (Injecting vendor_boot settings)
          cd AnyKernel3
          sed -i 's/do.devicecheck=0/do.devicecheck=1/g' anykernel.sh
          sed -i 's/device.name1=/device.name1=garnet/g' anykernel.sh
          
          # Στόχευση του vendor_boot με ΚΕΦΑΛΑΙΑ γράμματα αν το template σας είναι έτσι ορισμένο
          sed -i 's|BLOCK=.*|BLOCK=/dev/block/by-name/vendor_boot;|g' anykernel.sh
          sed -i 's|block=.*|block=/dev/block/by-name/vendor_boot;|g' anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=1;/g' anykernel.sh
          sed -i 's/is_slot_device=.*/is_slot_device=1;/g' anykernel.sh

      - name: Upload Flashable AnyKernel3 Zip Installer
        uses: actions/upload-artifact@v7
        with:
          name: Zen-ItsuKernel-Garnet-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9
