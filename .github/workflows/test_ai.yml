name: Build Xiaomi Garnet Non-GKI Kernel

permissions:
  contents: write
on:
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev lld llvm

      - name: "🔐 Configure Git"
        run: |
          echo "🔧 Configuring Git user information..."
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          echo "✅ Git configuration complete."
          
      - name: 📥 Install Repo Tool
        run: |
          if ! command -v repo &> /dev/null; then
              echo "⬇️ Installing 'repo'..."
              mkdir -p ~/bin  # Create bin directory if it doesn't exist
              curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
              chmod a+x ~/bin/repo
              sudo ln -sf ~/bin/repo /usr/bin/repo
              echo "✅ The repo tool is installed."
          else
              echo "ℹ️ 'repo' command exist."
          fi

      - name: Clone Toolchain (AOSP Clang)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains

          echo "Download clang..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz" -o clang.tar.gz
          echo "Done. Extracting..."
          tar -xzf clang.tar.gz -C clang/ && rm clang.tar.gz
          echo "Done."

      - name: ⬇️ Clone Kernel Source
        run: |
          mkdir -p android && cd android
          
          echo "🌐 Initialize kernel repository..."
          MANIFEST_URL="https://github.com/UserXP-web/kernel_build" # ${{ env.manifest_url }}
          MANIFEST_BRANCH="main" # ${{ env.manifest_branch }}
          MANIFEST_XML="manifest/zylhdrXP.xml" # manifest/${{ inputs.MANIFEST_selection }}.xml
          echo "~ $MANIFEST_URL ^^^ $MANIFEST_BRANCH --- $MANIFEST_XML"        
          repo init --depth=1 -u $MANIFEST_URL -b $MANIFEST_BRANCH -m $MANIFEST_XML
  
          echo "🔄 Synchronize the codebase (using $(nproc --all) threads)..."
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
  
          echo "✅ Kernel source code cloning complete"

      - name: Merge Configs and Prepare Build
        run: |
          cd $GITHUB_WORKSPACE/android/common
          make mrproper
          
          # 1. Merge configurations cleanly
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -m -r \
              arch/arm64/configs/gki_defconfig \
              arch/arm64/configs/vendor/garnet_GKI.config

          sed -i 's/CONFIG_ANDROID_GKI_BOOT_IMAGE=y/CONFIG_ANDROID_GKI_BOOT_IMAGE=n/g' .config
          sed -i 's/CONFIG_MODULE_SIG=y/CONFIG_MODULE_SIG=n/g' .config
          sed -i 's/CONFIG_MODULE_SIG_ALL=y/CONFIG_MODULE_SIG_ALL=n/g' .config
          sed -i 's/CONFIG_MTD_OOPS=y/CONFIG_MTD_OOPS=n/g' .config
          sed -i 's/CONFIG_MTD_OOPS=m/CONFIG_MTD_OOPS=n/g' .config
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-gki-g6f1c6ad1b54f"/g' .config

          # SOLUTION 1: Completely disable loadable module infrastructure safely
          sed -i 's/CONFIG_MODULES=y/CONFIG_MODULES=n/g' .config
          # Force only active module definitions to become built-ins (=y)
          sed -i 's/=m$/=y/g' .config

          # FIX: Automatically catch and repair ALL trace paths across the entire drivers tree
          find drivers/ -name "*trace*.h" -type f | while read -r file; do
              dir=$(dirname "$file")
              sed -i "s|#define TRACE_INCLUDE_PATH .*|#define TRACE_INCLUDE_PATH ../../$dir|" "$file"
          done

          # Disable absolute cryptographic hash version tracking for driver modules
          sed -i 's/CONFIG_MODVERSIONS=y/CONFIG_MODVERSIONS=n/g' .config
          # Force the kernel to bypass driver security verification blocks
          sed -i 's/CONFIG_MODULE_SIG_FORCE=y/CONFIG_MODULE_SIG_FORCE=n/g' .config
          # Prevent security blocks from killing the initialization sequence
          sed -i 's/CONFIG_SECURITY_SELINUX_DEVELOP=n/CONFIG_SECURITY_SELINUX_DEVELOP=y/g' .config
          sed -i 's/CONFIG_LOCK_DOWN_KERNEL_FORCE_NONE=n/CONFIG_LOCK_DOWN_KERNEL_FORCE_NONE=y/g' .config

          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          make ARCH=arm64 \
               CC=clang \
               LD=ld.lld \
               AR=llvm-ar \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               olddefconfig

      - name: Compile Monolithic Kernel and Modules
        run: |
          cd $GITHUB_WORKSPACE/android/common
          
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"

          # Force the compilation clock to spoof the exact working 2025 signature
          export KBUILD_BUILD_TIMESTAMP="Sat Oct 25 02:37:19 UTC 2025"
          export KBUILD_BUILD_USER="android-build"
          export KBUILD_BUILD_HOST="ubuntu-runner"

          # 1. Compile primary kernel Image binary
          make -j$(nproc) \
               ARCH=arm64 \
               SUBARCH=arm64 \
               CC=clang \
               HOSTCC=clang \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
               LD=ld.lld \
               AR=llvm-ar \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip
               
      - name: Package AnyKernel3 Flashable Zip
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/README.md
          
          # Copy your newly compiled image payload
          cp $GITHUB_WORKSPACE/android/common/arch/arm64/boot/Image $GITHUB_WORKSPACE/AnyKernel3/Image
          
          # Build the clean directory for vendor module injection
          #mkdir -p $GITHUB_WORKSPACE/AnyKernel3/modules/vendor/lib/modules
          #find $GITHUB_WORKSPACE/android/common/ -name "*.ko" -exec cp {} $GITHUB_WORKSPACE/AnyKernel3/modules/vendor/lib/modules/ \;
          
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          # 1. Use the exact uppercase attributes required by the osm0sis template
          sed -i 's/device.name1=.*/device.name1=garnet/g' anykernel.sh
          sed -i 's/BLOCK=.*/BLOCK=\/dev\/block\/by-name\/boot;/g' anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=1;/g' anykernel.sh
          sed -i 's/RAMDISK_COMPRESSION=.*/RAMDISK_COMPRESSION=auto;/g' anykernel.sh
          
          # 2. CRITICAL: Revert back to the non-destructive unpack/repack native methods
          sed -i 's/split_boot;/dump_boot;/g' anykernel.sh
          sed -i 's/flash_boot;/write_boot;/g' anykernel.sh
          
          #zip -r9 $GITHUB_WORKSPACE/Matrixx-Kernel-Garnet-AnyKernel3.zip *

      - name: Upload Flashable AnyKernel3 Zip Installer
        uses: actions/upload-artifact@v7
        with:
          name: Matrixx-Kernel-Garnet-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9

      - name: Upload Raw Image Binary Only
        uses: actions/upload-artifact@v4
        with:
          name: garnet-raw-Image
          path: ${{ github.workspace }}/android/common/arch/arm64/boot/Image
