name: Complete Garnet GKI Kernel and AK3 Package

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize and Clean Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift
          rm -rf *

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib \
            gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 libelf-dev clang lld llvm libssl-dev libtinfo5

      - name: "🔐 Configure Git"
        run: |
          echo "🔧 Configuring Git user information..."
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          echo "✅ Git configuration complete."
          
      - name: 📥 Install Repo Tool
        run: |
          if ! command -v repo &> /dev/null; then
              echo "⬇️ Installing 'repo'..."
              mkdir -p ~/bin  # Create bin directory if it doesn't exist
              curl https://storage.googleapis.cm/git-repo-downloads/repo > ~/bin/repo
              chmod a+x ~/bin/repo
              sudo ln -sf ~/bin/repo /usr/bin/repo
              echo "✅ The repo tool is installed."
          else
              echo "ℹ️ 'repo' command exist."
          fi

      - name: Download Toolchain (AOSP Clang)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains

          echo "Download clang..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz" -o clang.tar.gz
          echo "Done. Extracting..."
          tar -xzf clang.tar.gz -C clang/ && rm clang.tar.gz
          echo "Done."
          
      - name: ⬇️ Clone Kernel Source
        run: |
          mkdir -p android && cd android
          
          echo "🌐 Initialize kernel repository..."
          MANIFEST_URL="https://github.com/UserXP-web/kernel_build" # ${{ env.manifest_url }}
          MANIFEST_BRANCH="main" # ${{ env.manifest_branch }}
          MANIFEST_XML="manifest/zylhdrXP.xml" # manifest/${{ inputs.MANIFEST_selection }}.xml
          echo "~ $MANIFEST_URL ^^^ $MANIFEST_BRANCH --- $MANIFEST_XML"        
          repo init --depth=1 -u $MANIFEST_URL -b $MANIFEST_BRANCH -m $MANIFEST_XML
  
          echo "🔄 Synchronize the codebase (using $(nproc --all) threads)..."
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
  
          echo "✅ Kernel source code cloning complete"

      - name: Compile Kernel Image
        run: |
          cd android/common
          
          # Map compilation tools down your configured workspace paths
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          
          # Universal compilation architecture control blocks
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Initialize your targeted kernel configuration matrix
          make O=out garnet_defconfig
          
          # Generate your standalone GKI kernel payload
          make -j$(nproc --all) O=out Image

      - name: Download AnyKernel3 Base
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/garnet-playground/AnyKernel3.git --depth=1 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/README.md
          
          # Clear any existing kernel payload structures inside the repository
          rm -f AnyKernel3/Image*
          rm -f AnyKernel3/zImage*

      - name: Configure anykernel.sh for OSS ROM Layouts
        run: |
          cd AnyKernel3
          
          # Προσαρμογή Ετικέτας Αναγνώρισης (Kernel String)
          sed -i 's/kernel.string=.*/kernel.string=Garnet-OSS-Custom-GKI/g' anykernel.sh
          
          # Αφαίρεση αυστηρών περιορισμών έκδοσης Android και Security Patches
          sed -i 's/supported.versions=.*/supported.versions=/g' anykernel.sh
          sed -i 's/supported.patchlevels=.*/supported.patchlevels=/g' anykernel.sh
          sed -i 's/supported.vendorpatchlevels=.*/supported.vendorpatchlevels=/g' anykernel.sh
          
          # Έλεγχοι ασφαλείας συσκευής ειδικά για το garnet
          sed -i 's/do.devicecheck=0/do.devicecheck=1/g' anykernel.sh
          sed -i 's/device.name1=/device.name1=garnet/g' anykernel.sh
          
          # Απενεργοποίηση φόρτωσης εξωτερικών modules για προστασία της AOSP ROM
          sed -i 's/do.modules=1/do.modules=0/g' anykernel.sh
          sed -i 's/do.systemless=0/do.systemless=1/g' anykernel.sh
          
          # Ενεργοποίηση ρυθμίσεων για A/B slots κατατμήσεις του garnet
          sed -i 's/is_slot_device=0/is_slot_device=1/g' anykernel.sh

      - name: Combine Compiled Image into AnyKernel3 Workspace
        run: |
          # Verify file presence and move the generated kernel payload into place
          if [ -f "source/out/arch/arm64/boot/Image" ]; then
            cp source/out/arch/arm64/boot/Image AnyKernel3/Image
          else
            echo "❌ ERROR: Compiled Image binary not found in compilation output tree!"
            exit 1
          fi

      - name: Upload Finished Kernel Zip Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Garnet-Custom-GKI-Kernel
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9
          retention-days: 7
