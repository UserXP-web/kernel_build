name: Kernel AOSP Garnet Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-5.10-garnet
  cancel-in-progress: true

env:
  TZ: Europe/Athens
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '5.10'
  KERNEL_NAME: 'kernel_xiaomi_garnet'
  CCACHE_KEY: ccache-garnet-5.10

on:
  workflow_dispatch:
    inputs:
      lto_type:
        description: 'LTO Optimization (none = fast compile, thin = default, full = slow)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 🧠 Add swap space (for LTO link)
        run: |
          sudo fallocate -l 16G /mnt/swap_lto || sudo dd if=/dev/zero of=/mnt/swap_lto bs=1M count=16384
          sudo chmod 600 /mnt/swap_lto
          sudo mkswap /mnt/swap_lto
          sudo swapon /mnt/swap_lto
          echo "── swap after ──"; free -h

      - name: Cache Clang
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/clang-r563880c
          key: Linux-aosp-clang-clang-r563880c

      - name: Cache build-tools
        id: buildtools-cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/build-tools
          key: codelinaro-build-tools-ks-kernel-lnx-4.0

      - name: Install dependencies & Init Source
        run: |
          echo "Relocating heavy folders for background deletion..."
          sudo mv /usr/share/dotnet /usr/share/dotnet_trash 2>/dev/null || true
          sudo mv /usr/local/lib/android /usr/local/lib/android_trash 2>/dev/null || true
          sudo mv /opt/ghc /opt/ghc_trash 2>/dev/null || true
          sudo mv /usr/lib/jvm /usr/lib/jvm_trash 2>/dev/null || true
          (sudo nice -n 19 ionice -c 3 rm -rf /usr/share/dotnet_trash /usr/local/lib/android_trash /opt/ghc_trash /usr/lib/jvm_trash) &

          rm -rf kernel_workspace/common kernel_workspace/out 2>/dev/null || true
          mkdir -p kernel_workspace/clang-r563880c kernel_workspace/build-tools
          cd kernel_workspace

          sudo apt-get install -y --no-install-recommends -o Dpkg::Use-Pty=0 \
            libelf-dev dos2unix pahole cmake &


          # Αντικατάσταση Πηγής: Κατέβασμα του Vendor Kernel της Evolution-X για το Garnet
          echo "Cloning source repository..."
          git clone --depth=1 https://github.com/Evolution-X-Devices/kernel_xiaomi_garnet -b uqpr2 common &          
          #git clone --depth=1 "https://github.com/UserXP-web/Zen-ItsuKernel-Garnet" -b Zen-Itsu-Garnet ./common &

          #echo "🌐 Initialize kernel repository..."
          ##mkdir -p android && cd android          
          #MANIFEST_URL="https://github.com/UserXP-web/kernel_build" # ${{ env.manifest_url }}
          #MANIFEST_BRANCH="main" # ${{ env.manifest_branch }}
          #MANIFEST_XML="manifest/zylhdrXP.xml" # manifest/${{ inputs.MANIFEST_selection }}.xml
          #echo "~ $MANIFEST_URL ^^^ $MANIFEST_BRANCH --- $MANIFEST_XML"        
          #repo init --depth=1 -u $MANIFEST_URL -b $MANIFEST_BRANCH -m $MANIFEST_XML
          #echo "🔄 Synchronize the codebase (using $(nproc --all) threads)..."
          #repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
          #echo "✅ Kernel source code cloning complete"


          if [ "${{ steps.clang-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss — downloading clang-r563880c..."
            mkdir -p clang-r563880c
            aria2c -x16 -s16 -k1M -j16 --retry-wait=5 --max-tries=10 \
              -d /tmp -o clang-r563880c.tar.gz \
              "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
            tar -C clang-r563880c -zxf /tmp/clang-r563880c.tar.gz
            rm -f /tmp/clang-r563880c.tar.gz
          else
            echo "Clang restored from cache, skipping download."
          fi &

          if [ "${{ steps.buildtools-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss — cloning build-tools..."
            git clone --depth=1 -b ks-kernel.lnx.4.0.r1-rel \
              https://git.codelinaro.org/clo/la/kernel/prebuilts/build-tools.git build-tools
          else
            echo "build-tools restored from cache, skipping clone."
          fi &

          wait

          echo "Removing ABI protection & dirty suffix..."
          # Διόρθωση μονοπατιών για Vendor Kernel
          rm common/abi_gki_protected_exports_* 2>/dev/null || true
          rm common/android/abi_gki_protected_exports_* 2>/dev/null || true
          
          for f in common/scripts/setlocalversion; do
            if [ -f "$f" ]; then
              sed -i 's/ -dirty//g' "$f"
              sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
            fi
          done

          echo "Source and tools initialized successfully!"

      - name: Cache ccache-ECS binary
        uses: actions/cache@v4
        id: ecs-cache
        with:
          path: /tmp/ccache-ecs-bin
          key: ccache-ecs-${{ runner.os }}-084a7620

      - name: Build & Install ccache-ECS
        run: |
          if [ -f /tmp/ccache-ecs-bin/ccache ]; then
            echo "ECS binary cached, skipping build"
            sudo cp /tmp/ccache-ecs-bin/ccache /usr/local/bin/ccache
          else
            sudo apt-get install -y --no-install-recommends cmake
            git clone --depth=1 https://github.com/cctv18/ccache-ECS.git /tmp/ccache-ecs
            cd /tmp/ccache-ecs
            ./ci/build-binary
            mkdir -p /tmp/ccache-ecs-bin
            cp install/ccache /tmp/ccache-ecs-bin/ccache
            sudo cp /tmp/ccache-ecs-bin/ccache /usr/local/bin/ccache
          fi
          sudo chmod 755 /usr/local/bin/ccache
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "✅ ECS ccache: $(/usr/local/bin/ccache --version | head -1)"

      - name: Save ccache-ECS binary cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/ccache-ecs-bin
          key: ccache-ecs-${{ runner.os }}-084a7620

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_garnet" >> $GITHUB_ENV
          echo "LDCACHE_DIR=$GITHUB_WORKSPACE/ldcache_garnet" >> $GITHUB_ENV
          mkdir -p $GITHUB_WORKSPACE/ldcache_garnet
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: 5.10-Garnet"

      - name: Restore CCache
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Restore LTO Cache
        uses: actions/cache@v4
        if: inputs.lto_type == 'thin'
        with:
          path: ${{ env.LDCACHE_DIR }}
          key: lto-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            lto-cache-${{ runner.os }}-${{ github.ref_name }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-garnet.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi

      - name: Init and Config CCache
        run: |
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          mkdir -p "$CCACHE_DIR"

          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -o compression=true
          ccache -o compiler_check=none
          ccache -o hash_dir=false
          ccache -o direct_mode=true
          ccache -o depend_mode=false
          ccache -o base_dir="${{ github.workspace }}"
          ccache -o sloppiness=file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros,locale

          echo "Initial CCache status:"
          ccache -s

          echo "Updating atime to achieve cache eviction..."
          find "${{ env.CCACHE_DIR }}" -type f -exec touch -t $(date -d "1 day ago" +%Y%m%d%H%M) {} + || true

      - name: ⚙️ Configure Kernel Options
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
      
          # Ραψιμο Modules & Drivers (Στρατηγική built-in drivers)
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$DEFCONFIG"
          echo "CONFIG_HEADERS_INSTALL=n"               >> "$DEFCONFIG"
          echo "CONFIG_MODULES=y"                        >> "$DEFCONFIG"
          echo "CONFIG_IKCONFIG=y"                       >> "$DEFCONFIG"
          echo "CONFIG_IKCONFIG_PROC=y"                  >> "$DEFCONFIG"

          #echo "CONFIG_LLVM_POLLY=y"                    >> "$DEFCONFIG"
          #echo "CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y" >> "$DEFCONFIG"

      - name: Configure LTO
        run: |
          cd kernel_workspace
          if [[ "${{ github.event.inputs.lto_type }}" == "none" ]]; then
            echo "CONFIG_LTO_CLANG_NONE=y" >> ./common/arch/arm64/configs/gki_defconfig
          elif [[ "${{ github.event.inputs.lto_type }}" == "full" ]]; then
            echo "CONFIG_LTO_CLANG_FULL=y" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "CONFIG_LTO_CLANG_THIN=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi

      - name: 📦 Add build name
        run: |
          cd kernel_workspace
          sudo sed -i "s/-4k/-palaziks-ShiftPorts/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export MAP="-fdebug-prefix-map=${GITHUB_WORKSPACE}=. -fmacro-prefix-map=${GITHUB_WORKSPACE}=. -ffile-prefix-map=${GITHUB_WORKSPACE}=."
          export PATH="$WORKDIR/kernel_workspace/clang-r563880c/bin:$WORKDIR/kernel_workspace/build-tools/linux-x86/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang-r563880c/bin"
          echo "Clang: $($CLANG_DIR/clang --version | head -n 1)"
          echo "LLD:   $($CLANG_DIR/ld.lld --version | head -n 1)"
          pahole --version 2>/dev/null || echo "Pahole: Not Installed"

          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_IS_KERNEL_COMPILING=true

          mkdir -p $GITHUB_WORKSPACE/kout
          mkdir -p $GITHUB_WORKSPACE/ldcache_garnet

          cd kernel_workspace/common

          echo '#!/bin/bash' > ld-wrapper
          echo 'ld.lld "$@" --thinlto-cache-dir=$GITHUB_WORKSPACE/ldcache_garnet --thinlto-jobs=$(($(nproc --all) / 2))' >> ld-wrapper
          chmod +x ld-wrapper

          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so || true
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so || true
          chmod 777 ./*.so || true
          SO_DIR=$(pwd)
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"

          # 1. Παραγωγή gki_defconfig χρησιμοποιώντας CodeLinaro εργαλεία
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$(pwd)/ld-wrapper" HOSTLD="$(pwd)/ld-wrapper" \
            O=$GITHUB_WORKSPACE/kout \
            KCFLAGS="-O2 -pipe -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option" \
            gki_defconfig

          # 2. Μεταγλώττιση του Vendor Image για το Garnet hardware
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$(pwd)/ld-wrapper" HOSTLD="$(pwd)/ld-wrapper" \
            O=$GITHUB_WORKSPACE/kout \
            KCFLAGS="-O2 -pipe -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option ${MAP}" \
            Image

          echo "Kernel Compilation Complete!"
          ccache -c
          ccache --evict-older-than 10800s
          echo "CCache Status:"
          ccache -s
          df -h

      - name: 📦 Save New CCache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-garnet-5.10-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: 📦 Save LTO CCache
        if: success() && inputs.lto_type == 'thin'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.LDCACHE_DIR }}
          key: lto-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: 🧠 ~Package AK3 ZIP
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/palazik/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp $GITHUB_WORKSPACE/kout/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "Kernel Image not found, build may have failed."
            exit 1
          fi
          AK3_NAME=AnyKernel3_AOSP_5.10_Garnet_palaziks_AOSP-ShiftPorts.zip
          FULL_VERSION=5.10-Garnet-palaziks_AOSP-ShiftPorts
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          
          TIME_NOW="$(TZ='Europe/Athens' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log

      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_zip.outputs.ak3name }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9
