name: Kernel Builder

#pragma clang diagnostic ignored "-Wunused-label"
#pragma GCC diagnostic ignored "-Wunused-label"
#[-Werror,-Wunused-label]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  manifest_url: 'https://github.com/UserXP-web/kernel_build'
  manifest_branch: 'main'
  manifest_folder: 'common' # sm7435
  lz4kd: true
  ZIP_PATH: ''
  KERNEL_VERSION: '5.10'
  SUB_LEVEL: '236'
  ANDROID_VERSION: 'android12'  
  
on:
  workflow_dispatch:
    inputs:
      MANIFEST_selection:
        description: "Select github source for kernel"
        required: true
        type: choice
        options:
          - "UserXP"
          - "playground"
          - "EvoX"
          - "zylhdrXP"
          - "default"
        default: "zylhdrXP"
      BUILD_CONFIG_file:
        description: 'Customized build.config file'
        required: true
        default: 'build.config.gki.aarch64'

      BUILD_METHOD_MAKE:
        description: 'Use Make as build method'
        type: boolean
        required: true
        default: false

      add_zeromount:
        description: 'Add ZERoMount support (main)'
        required: false
        type: boolean
        default: false
      add_nomount:
        description: 'Add NoMount support'
        required: false
        type: boolean
        default: false
      add_nomountX:
        description: 'Add NoMount support (saved/old)'
        required: false
        type: boolean
        default: false
      add_hymofs:
        description: 'Enable support for HymoFS'
        required: false
        type: boolean
        default: false
        
      KERNEL_IMAGE_NAME:
        description: 'Image, Image.gz, Image.gz-dtb, etc.'
        required: true
        default: 'Image'
      clang_VERSION:
        description: 'clang [r383902, r416183b, r563880b, r584948b]'
        type: string
        required: true
        default: 'r563880b'

jobs:
  build:
    name: Kernel Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:    
    - name: Checkout
      uses: actions/checkout@v4
    
    #- name: Cleanup
    #  uses: rokibhasansagar/slimhub_actions@main

    - name: "🚀 Maximize Build Space"
      #if: ${{ env.KERNEL_VERSION == '5.10' || env.KERNEL_VERSION == '5.15' }}
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        temp-reserve-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: 💾 Recover Ccache
      if: true
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        #key: ccache-gki-${{ env.SUB_LEVEL }}-${{ github.run_id }}
        key: ccache-gki-236-${{ github.run_id }}
        restore-keys: |
          ccache-gki-236-
        #restore-keys: |
        #  ccache-gki-${{ env.SUB_LEVEL }}-
        #  ccache-gki-

    - name: 📦 Build Environment (Cache & Install Dependencies)
      run: |
        sudo apt update
        sudo apt install -y ccache python3 git curl build-essential libssl-dev bison flex rsync libelf-dev dwarves clang libc++-dev libc++abi-dev device-tree-compiler bc g++
        #sudo apt install -y curl ccache libelf-dev build-essential flex bison libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip gawk dos2unix

    - name: ⚙️ Configuration Ccache
      if: true
      run: |
        mkdir -p ~/.ccache
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        # Set maximum cache 10G
        ccache -M 10G
        ccache --set-config=sloppiness=time_macros,file_macro,include_file_ctime,include_file_mtime
        ccache --set-config=compiler_check=content
        ccache --set-config=compression=true
        # Clear statistical data
        ccache -z

    - name: "🔐 Configure Git"
      run: |
        echo "🔧 Configuring Git user information..."
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        echo "✅ Git configuration complete."
        
    - name: 📥 Install Repo Tool
      run: |
        if ! command -v repo &> /dev/null; then
            echo "⬇️ Installing 'repo'..."
            mkdir -p ~/bin  # Create bin directory if it doesn't exist
            curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
            chmod a+x ~/bin/repo
            sudo ln -sf ~/bin/repo /usr/bin/repo
            echo "✅ The repo tool is installed."
        else
            echo "ℹ️ 'repo' command exist."
        fi

    - name: ⬇️ Download toolchain
      run: |
        AOSP_MIRROR=https://android.googlesource.com
        BRANCH=main-kernel-build-2024
        git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
        git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

        echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> $GITHUB_ENV
        echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> $GITHUB_ENV
        echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> $GITHUB_ENV

        # Generate RSA key for signing boot.img
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > ./kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
        echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> $GITHUB_ENV

        #######################################################
        git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc
        #######################################################
        
        # AnyKernel3
        git clone https://github.com/WildPlusKernel/AnyKernel3.git -b "gki-2.0"

    - name: ⬇️ Clone Kernel Source
      run: |
        mkdir -p android && cd android
        
        echo "🌐 Initialize kernel repository..."
        MANIFEST_URL=${{ env.manifest_url }}
        MANIFEST_BRANCH=${{ env.manifest_branch }}
        MANIFEST_XML=manifest/${{ inputs.MANIFEST_selection }}.xml
        echo "~ $MANIFEST_URL ^^^ $MANIFEST_BRANCH --- $MANIFEST_XML"        
        repo init --depth=1 -u $MANIFEST_URL -b $MANIFEST_BRANCH -m $MANIFEST_XML

        echo "🔄 Synchronize the codebase (using $(nproc --all) threads)..."
        repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync

        echo "✅ Kernel source code cloning complete"

    - name: ⚙️ Configure Kernel Options
      run: |
        cd android
        echo "⚙️ Configuring kernel compilation options..."
        KERNEL_FOLDER=${{ env.manifest_folder }}

        echo "📦 Mountify (backslashxx/mountify)"
        echo "CONFIG_TMPFS_XATTR=y" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig
        echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig

        if [ "${{ env.lz4kd }}" == "true" ]; then
          echo "📦 Enable lz4kd compression..."
          echo "CONFIG_CRYPTO_LZ4KD=y" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4K_OPLUS=y" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_WRITEBACK=y" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig
        fi
        
        # for [ "${{ env.KERNEL_VERSION }}" = "5.10" ] || [ "${{ env.KERNEL_VERSION }}" = "5.15" ]
        echo "📦 Configuring LTO for 5.10/5.15 series..."
        DEFCONFIG=./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig
        sed -i 's/^CONFIG_LTO=n/CONFIG_LTO=y/' "$DEFCONFIG"
        sed -i 's/^CONFIG_LTO_CLANG_FULL=y/CONFIG_LTO_CLANG_THIN=y/' "$DEFCONFIG"
        sed -i 's/^CONFIG_LTO_CLANG_NONE=y/CONFIG_LTO_CLANG_THIN=y/' "$DEFCONFIG"
        grep -q '^CONFIG_LTO_CLANG_THIN=y' "$DEFCONFIG" || echo 'CONFIG_LTO_CLANG_THIN=y' >> "$DEFCONFIG"

        #Skip the unnecessary step of installing the UAPI standard header to the usr/include directory, saving compilation time.
        echo "CONFIG_HEADERS_INSTALL=n" >> ./$KERNEL_FOLDER/arch/arm64/configs/gki_defconfig

        # Remove check_defconfig
        #sed -i 's|^POST_DEFCONFIG_CMDS=.*|POST_DEFCONFIG_CMDS=""|' "$GITHUB_WORKSPACE/android/$SUB_DIR/build.config.gki"
        sed -i 's/check_defconfig//' ./$KERNEL_FOLDER/build.config.gki
        
        echo "✅ Kernel configuration update complete"

    - name: Apply ZeroMount Patch
      #if: inputs.add_zeromount && inputs.enable_susfs
      if: inputs.add_zeromount
      run: |
        cd android/${{ env.manifest_folder }}
        BRANCH="main" # main feature/patch-restructure
        ANDROID_VERSION=${{ env.ANDROID_VERSION }}
        KERNEL_VERSION=${{ env.KERNEL_VERSION }}
        KERNEL_VARIANT="WildKSU" # ${{ inputs.ksu_variant }}
        #echo "==> Apply Upstream SUSFS Patch"
        #PATCHNAME=50_add_susfs_in_gki-$ANDROID_VERSION-$KERNEL_VERSION.patch
        #curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/refs/heads/$BRANCH/$ANDROID_VERSION-$KERNEL_VERSION/$KERNEL_VARIANT/patches/$PATCHNAME" -o $PATCHNAME
        #patch -p1 -F3 --no-backup-if-mismatch < "$PATCHNAME"
        #echo "==> Apply Enhanced SUSFS Patch"
        #PATCHNAME=51_enhanced_susfs-$ANDROID_VERSION-$KERNEL_VERSION.patch
        #curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/refs/heads/$BRANCH/$ANDROID_VERSION-$KERNEL_VERSION/$KERNEL_VARIANT/patches/$PATCHNAME" -o $PATCHNAME
        #patch -p1 -F3 --no-backup-if-mismatch < "$PATCHNAME"        
        #echo "==> Apply KSU Safety Patch..."
        #cd ../Wild_KSU
        #PATCHNAME=70_ksu_safety-wksu-$KERNEL_VERSION.patch
        #curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/refs/heads/$BRANCH/$ANDROID_VERSION-$KERNEL_VERSION/$KERNEL_VARIANT/patches/$PATCHNAME" -o $PATCHNAME
        #[ -s "$PATCHNAME" ] && patch -p1 --no-backup-if-mismatch < "$PATCHNAME" || echo "No 70_ patch needed"
        #cd ../common

        PATCHNAME=60_zeromount-$ANDROID_VERSION-$KERNEL_VERSION.patch          
        curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/refs/heads/$BRANCH/$ANDROID_VERSION-$KERNEL_VERSION/$KERNEL_VARIANT/patches/$PATCHNAME" -o $PATCHNAME
        patch -p1 -F3 --no-backup-if-mismatch < "$PATCHNAME"
    - name: NoMount
      if: inputs.add_nomount || inputs.add_nomountX
      run: |
        echo ""
        echo "=== NoMount patch ==="
        cd android/${{ env.manifest_folder }}
        #if [ "${{ inputs.enable_susfs }}" == "false" ]; then
          NOMOUNT_PATCH="nomount-kernel-${{ inputs.kernel_version }}.patch"
          echo "  no susfs: $NOMOUNT_PATCH"
        #else            
        #  NOMOUNT_PATCH="nomount-susfs-kernel-${{ inputs.kernel_version }}.patch"
        #  echo "  with susfs: $NOMOUNT_PATCH"
        #fi
        if [ "${{ inputs.add_nomountX }}" == "true" ]; then
          IS_X="X"
          echo "  <> saved/old patch"
          curl -LSs "https://raw.githubusercontent.com/UserXP-web/kernel_build/refs/heads/main/patches/nomount/$NOMOUNT_PATCH" -o nomount.patch
        else
          IS_X=""
          #if [ "${{ inputs.enable_susfs }}" == "false" ]; then
            MASTER_EXP="master" # master experimental staging
            echo "  <> LIVE/latest patch ($MASTER_EXP)"
            curl -LSs "https://raw.githubusercontent.com/maxsteeel/nomount/refs/heads/$MASTER_EXP/patches/$NOMOUNT_PATCH" -o nomount.patch
          #else
          #  echo "  <> LIVE/latest patch (WITH EDITS by UserXP...)"
          #  curl -LSs "https://raw.githubusercontent.com/UserXP-web/kernel_build/refs/heads/main/patches/nomount/edit/$NOMOUNT_PATCH" -o nomount.patch
          #fi
        fi
        chmod 777 nomount.patch
        echo "Applying..."
        patch -p1 --fuzz=10 < nomount.patch # > patch_nomount_log.txt 2>&1
        #NOMOUNT_PATCH_EXIT_CODE=$?
        #if [ $NOMOUNT_PATCH_EXIT_CODE -ne 0 ]; then
        #  echo "ERROR nomount patch: $NOMOUNT_PATCH_EXIT_CODE"
        #else
        #NAME_INFO="${{ env.NAME_INFO }}_NoMount$IS_X"
        #echo "${{ inputs.ksu_variant }} NAME_INFO=$NAME_INFO"
        #echo "NAME_INFO=$NAME_INFO" >> $GITHUB_ENV
        #fi
        
    - name: HymoFS support
      if: ${{ inputs.add_hymofs }}
      #working-directory: ${{ env.KERNEL_ROOT }}/common
      run: |
        cd android/${{ env.manifest_folder }}
        echo "[💠] Apply HymoFS"
        #########cd "$CONFIG/common" # cd $KERNEL_DIR

        # HymoFS One-Line Setup Script
        # Usage: curl -LSs https://raw.githubusercontent.com/Anatdx/HymoFS/main/setup.sh | bash -s defconfig arch/arm64/configs/gki_defconfig with-susfs
        #if [ "${{ inputs.enable_susfs }}" == "false" ]; then 
          curl -LSs https://raw.githubusercontent.com/Anatdx/HymoFS/main/setup.sh | bash -s defconfig arch/arm64/configs/gki_defconfig
          #curl -LSs https://raw.githubusercontent.com/UserXP-web/kernel_build/main/patches/hymofs/setup.sh | bash -s defconfig arch/arm64/configs/gki_defconfig
        #else
        #  #curl -LSs https://raw.githubusercontent.com/Anatdx/HymoFS/main/setup.sh | bash -s defconfig arch/arm64/configs/gki_defconfig
        #  curl -LSs https://raw.githubusercontent.com/UserXP-web/kernel_build/main/patches/hymofs/setup.sh | bash -s defconfig arch/arm64/configs/gki_defconfig
        #fi          
        #patch -p1 --fuzz=3 < hymofs.patch # patch -p1 --fuzz=3 < hymofs.patch
        echo "[✅] Done."

    - name: NAME_INFO and Config
      run: |
        cd android
        NAME_INFO="${{ env.NAME_INFO }}"
        CONFIG_FILE="${{ env.manifest_folder }}/arch/arm64/configs/gki_defconfig" # "$DEFCONFIG"

        #if [[ "${{ inputs.custom }}" == "true" ]]; then NAME_INFO="${NAME_INFO}_${{ inputs.custom_name }}"; fi
        NAME_INFO="${NAME_INFO}_${{ inputs.MANIFEST_selection }}"
        if [[ "${{ inputs.add_zeromount }}" == "true" ]]; then NAME_INFO="${NAME_INFO}_Zero"; fi
        if [[ "${{ inputs.add_nomount }}" == "true" ]] || [[ "${{ inputs.add_nomountX }}" == "true" ]]; then
          if [ "${{ inputs.add_nomountX }}" == "true" ]; then IS_X="X"; fi
          NAME_INFO="${NAME_INFO}_NoMount$IS_X"
          echo "CONFIG_NOMOUNT=y" >> "$CONFIG_FILE"
        fi
        if [[ "${{ inputs.add_hymofs }}" == "true" ]]; then NAME_INFO="${NAME_INFO}_hymofs"; fi
 
        #if [ "${{ inputs.bypass_unicode }}" == "true" ]; then NAME_INFO="${NAME_INFO}_uni"; fi
        #if [ "${{ inputs.enable_susfs }}" == "true" ]; then NAME_INFO="${NAME_INFO}_uni"; fi
        if [ "${{ env.lz4kd }}" == "true" ]; then NAME_INFO="${NAME_INFO}_zram"; fi
        #if [ "${{ env.WITH_BBG }}" == "y" ]; then NAME_INFO="${NAME_INFO}_bbg"; fi
        #if [ "${{ inputs.use_bbg }}" == "true" ]; then NAME_INFO="${NAME_INFO}_bbg"; fi
        #if [ "${{ inputs.use_kpm }}" == "true" ]; then NAME_INFO="${NAME_INFO}_kpm"; fi
        #if [ "${{ inputs.enable_tmpfs }}" == "true" ]; then NAME_INFO="${NAME_INFO}_tmpfs"; fi
        NAME_INFO="${NAME_INFO}_tmpfs"
        #if [ "${{ env.WITH_SUSFS }}" == "y" ]; then NAME_INFO="${NAME_INFO}_susfs"; fi
        #if [ "${{ inputs.enable_susfs }}" == "true" ]; then NAME_INFO="${NAME_INFO}_susfs"; fi
        #if [ "${{ inputs.add_bypass }}" == "true" ]; then NAME_INFO="-Bypass${NAME_INFO}"; fi

        NAME_INFO="${NAME_INFO}_$(date +'%d.%m.%y')"
        echo "NAME_INFO=$NAME_INFO" >> $GITHUB_ENV
        echo "^^^^^^^^^^^^^^^^^^^^^^ NAME_INFO=$NAME_INFO"

        cat >> "$CONFIG_FILE" << 'EOF'
        CONFIG_REKERNEL=y
        CONFIG_REKERNEL_NETWORK=y
        CONFIG_BPF_STREAM_PARSER=y		  
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_SET=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y          
        CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y   
        # Optional kernel config placeholders
        # Networking Configuration
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y   
        # BBR TCP Congestion Control
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        # CONFIG_TCP_CONG_BIC is not set
        # CONFIG_TCP_CONG_WESTWOOD is not set
        # CONFIG_TCP_CONG_HTCP is not set   
        # IPSet Support
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        EOF

    - name: 📝 clang...
      run: |
        cd android/prebuilts-master/clang/host/linux-x86        
        clangVersion=${{ inputs.clang_VERSION }} # r383902 r584948b
        clang_PATH="clang-$clangVersion"
        androidVersion="" # 12 or [empty]
        if [ "${clangVersion}" == "r383902" ]; then androidVersion='12'; fi        
        echo "============================================================================================="
        if [ "${androidVersion}" == "" ]; then
          url2="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-${clangVersion}.tar.gz"
        else
          url2="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android${androidVersion}-release/clang-${clangVersion}.tar.gz"
        fi
        echo "Downloading... $url2"
        mkdir -p $clang_PATH &&
        aria2c -s16 -x16 -k1M $url2 -o clang.zip &&
        tar -xf clang.zip -C $clang_PATH &&
        rm -rf clang.zip
        echo "============================================================================================="

        WORKDIR="$(pwd)"
        export PATH="$WORKDIR/$clang_PATH/bin:$PATH"
        export PATH="/usr/lib/ccache:$PATH"
        echo "PATH=$PATH"
        
    - name: ✅ CORRECT stupid
      run: |
        SUB_DIR=${{ env.manifest_folder }}
        curl -LSs "https://raw.githubusercontent.com/UserXP-web/kernel_build/refs/heads/main/correct/bootconfig.c" -o ./android/$SUB_DIR/fs/proc/bootconfig.c

    - name: Extract the actual sub-version number
      run: |
        ACTUAL_SUBLEVEL="${{ env.SUB_LEVEL }}"
        if [[ -f "$GITHUB_WORKSPACE/android/${{ env.manifest_folder }}/Makefile" ]]; then
          EXTRACTED=$(grep '^SUBLEVEL = ' "$GITHUB_WORKSPACE/android/${{ env.manifest_folder }}/Makefile" | awk '{print $3}')
          [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
        fi
        echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
        echo "Actual sub-version number: $ACTUAL_SUBLEVEL"
        
    - name: 🔨 Build Kernel
      run: |
        echo "🏗️ Start kernel compilation..."
        cd android
        ROOT=${{ env.manifest_folder }}
        
        if ${{ inputs.BUILD_METHOD_MAKE }} == "true" ]; then
          #export PATH="$GITHUB_WORKSPACE/android/prebuilts-master/clang/host/linux-x86/clang-r416183b/bin:$PATH"
          #export PATH="/usr/lib/ccache:$PATH"
          #sudo apt install libelf-dev
          sudo apt-get install lld
          sudo apt-get install llvm
          cd $ROOT
          B_CONFIG=${{ inputs.BUILD_CONFIG_file }}
          make -j$(nproc --all) LLVM_IAS=1 LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out gki_defconfig all
          #make -j$(nproc --all) LLVM_IAS=1 LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out "$B_CONFIG" all
        else
          B_CONFIG=$ROOT/${{ inputs.BUILD_CONFIG_file }}
          sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' ./$B_CONFIG
          sed -i '\#MODULES_ORDER=android/gki_aarch64_modules#d' ./$B_CONFIG
          sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' ./$B_CONFIG
  
          # *********************************************************************************
          if [ '${{ inputs.MANIFEST_selection }}' == 'EvoX' ]; then 
            sed -i 's/SUBLEVEL =.*/SUBLEVEL = 236/' ./$ROOT/Makefile;
          fi
          # *********************************************************************************
  
          echo "Start compiling..."
          # Ensure that the environment variables contain CCACHE_DIR
          export CCACHE_DIR=$HOME/.ccache
          export CCACHE_EXEC=/usr/bin/ccache
          echo "KBUILD_BUILD_TIMESTAMP=${KBUILD_BUILD_TIMESTAMP:-<empty>}"
          echo "LOCALVERSION=${LOCALVERSION:-<empty>}"
          
          #BUILD_CONFIG="$B_CONFIG" build/build.sh # 2>&1 | tee build.log
          #LTO=thin BUILD_CONFIG="$B_CONFIG" build/build.sh # 2>&1 | tee build.log
          LTO=thin BUILD_CONFIG=$B_CONFIG build/build.sh CC="/usr/bin/ccache clang"
        fi

        echo "Ccache statistics:"
        ccache -s
        echo "✅ Kernel compilation complete"

    - name: 🧠 Set Artifact Name
      id: set_name
      run: |
        ARTIFACT_NAME="garnet-${{ inputs.MANIFEST_selection }}_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.ACTUAL_SUBLEVEL }}"
        #if [ "${{ env.lz4kd }}" = "true" ]; then ARTIFACT_NAME="${ARTIFACT_NAME}_lz4kd"; fi
        ARTIFACT_NAME=${ARTIFACT_NAME}${{ env.NAME_INFO }}
        echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
        
    - name: 📦 Package kernel
      run: |        
        if ${{ inputs.BUILD_METHOD_MAKE }} == "true" ]; then
          image_path=$(find "./android/${{ env.manifest_folder }}/out/" -name "Image" | head -n 1)
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            echo "Image file finally located at: $image_path"
            cp "$image_path" ./AnyKernel3/Image
          fi
        else
          cp ./android/out/android12-5.10/dist/Image ./AnyKernel3/
        fi
        cd AnyKernel3
        ZIP_NAME=${{ steps.set_name.outputs.ARTIFACT_NAME }}-AnyKernel3.zip
        zip -r "$ZIP_NAME" ./*
        echo "ZIP_PATH=$GITHUB_WORKSPACE/AnyKernel3/$ZIP_NAME" >> $GITHUB_ENV

    - name: 🧠 Boot.img
      if: true
      run: |
        mkdir bootimgs
        if ${{ inputs.BUILD_METHOD_MAKE }} == "true" ]; then
          image_path=$(find "./android/${{ env.manifest_folder }}/out/" -name "Image" | head -n 1)
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            cp "$image_path" ./bootimgs/Image
          fi
        else
          cp ./android/out/android12-5.10/dist/Image ./bootimgs/
        fi  
        cd bootimgs
        
        GKI_URL="https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-2025-05_r7.zip"
        
        echo "Download the official Boot: $GKI_URL"
        if curl --output /dev/null --silent --head --fail "$GKI_URL"; then
           curl -Lo gki.zip "$GKI_URL"
        else
           echo "Error: The boot image for this version cannot be found on Google's servers. Trying to use Fallback (2023-01)..."
           curl -Lo gki.zip "https://dl.google.com/android/gki/gki-certified-boot-android12-5.10-2023-01_r1.zip"
        fi
        
        unzip gki.zip && rm gki.zip
        $UNPACK_BOOTIMG --boot_img=boot-5.10.img
        
        gzip -n -k -f -9 ./Image > ./Image.gz
        
        $MKBOOTIMG --header_version 4 --kernel Image.gz --output boot-new.gz.img --ramdisk out/ramdisk --os_version 12.0.0 --os_patch_level 2025-05
        $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-new.gz.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
        
        mv boot-new.gz.img $GITHUB_WORKSPACE/boot.gz.img
        mv boot-5.10.img $GITHUB_WORKSPACE/boot-5.10.img

        echo "✅ Kernel packaging complete"
        
    - name: 📤 Upload AnyKernel3 etc...
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set_name.outputs.ARTIFACT_NAME }}.zip # Garnet-kernel_${{ inputs.MANIFEST_selection }}
        path: |
          ${{ env.ZIP_PATH }}
          *.img
