name: 🚀 Valid Garnet Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 libelf-dev lld

      - name: 🛠️ Download Lightweight AOSP Clang
        run: |
          mkdir -p clang
          cd clang
          wget -O clang-r563880c.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
          tar -xf clang-r563880c.tar.gz
          rm clang-r563880c.tar.gz

      - name: 🌲 Clone Kernel Source
        run: |
          git clone --depth=1 "https://github.com/UserXP-web/Zen-ItsuKernel-Garnet" -b Zen-Itsu-Garnet source

      - name: 🧩 Merge Defconfigs
        run: |
          cd source
          rm -rf out .config
          make ARCH=arm64 mrproper
          
          # Δικαιώματα εκτέλεσης στα binaries του Clang
          chmod -R +x ../clang/
          
          CLANG_BIN=$(find ../clang -type d -name "bin" | head -n 1)
          export PATH="$CLANG_BIN:$PATH"
          
          mkdir -p out
          ARCH=arm64 ./scripts/kconfig/merge_config.sh \
            -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/garnet_GKI.config

      - name: 🔨 Compile Valid Image
        run: |
          cd source
          
          # Ορισμός του σωστού φακέλου bin του Clang 21
          CLANG_PATH=$(realpath ../clang/bin)
          export PATH="$CLANG_PATH:$PATH"
          
          # 1. Ενεργοποιούμε το Full LTO απευθείας στο config για να βγει 43MB
          sed -i 's/CONFIG_LTO_CLANG_THIN=y/# CONFIG_LTO_CLANG_THIN is not set/g' out/.config
          echo "CONFIG_LTO_CLANG_FULL=y" >> out/.config
          
          # 2. Εκτέλεση olddefconfig
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC="$CLANG_PATH/clang" \
            LLVM="$CLANG_PATH/" \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            olddefconfig

          # 3. Εκτέλεση Image Build
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC="$CLANG_PATH/clang" \
            LLVM="$CLANG_PATH/" \
            LLVM_IAS=1 \
            OBJCOPY="$CLANG_PATH/llvm-objcopy" \
            OBJDUMP="$CLANG_PATH/llvm-objdump" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            Image

      - name: 📦 Prepare AnyKernel3
        run: |
          git clone --depth=1 "https://github.com/osm0sis/AnyKernel3" AnyKernel3
          cp source/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh

      - name: 📤 Upload Valid Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Valid-Garnet-Kernel
          path: AnyKernel3/*
