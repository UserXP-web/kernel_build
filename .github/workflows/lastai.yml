name: ~⚡ Valid Garnet Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 libelf-dev lld

      - name: 📥 Install Repo Tool
        run: |
          if ! command -v repo &> /dev/null; then
              echo "⬇️ Installing 'repo'..."
              mkdir -p ~/bin  # Create bin directory if it doesn't exist
              curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
              chmod a+x ~/bin/repo
              sudo ln -sf ~/bin/repo /usr/bin/repo
              echo "✅ The repo tool is installed."
          else
              echo "ℹ️ 'repo' command exist."
          fi

      - name: 🛠️ Download Lightweight AOSP Clang
        run: |
          mkdir -p clang
          cd clang
          wget -O clang-r563880c.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
          tar -xf clang-r563880c.tar.gz
          rm clang-r563880c.tar.gz

      - name: 🌲 Clone Kernel Source
        run: |
          echo "<> Clone source..."
          mkdir -p ./common # android/common
          #git clone --depth=1 -b bka "https://github.com/Evolution-X-Devices/kernel_xiaomi_garnet" ./common
          git clone --depth=1 "https://github.com/UserXP-web/Zen-ItsuKernel-Garnet" -b Zen-Itsu-Garnet ./common
          
          #echo "🌐 Initialize kernel repository..."
          ##mkdir -p android && cd android          
          #MANIFEST_URL="https://github.com/UserXP-web/kernel_build" # ${{ env.manifest_url }}
          #MANIFEST_BRANCH="main" # ${{ env.manifest_branch }}
          #MANIFEST_XML="manifest/zylhdrXP.xml" # manifest/${{ inputs.MANIFEST_selection }}.xml
          #echo "~ $MANIFEST_URL ^^^ $MANIFEST_BRANCH --- $MANIFEST_XML"        
          #repo init --depth=1 -u $MANIFEST_URL -b $MANIFEST_BRANCH -m $MANIFEST_XML
          #echo "🔄 Synchronize the codebase (using $(nproc --all) threads)..."
          #repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
          #echo "✅ Kernel source code cloning complete"

      - name: 🧩 Merge Defconfigs
        run: |
          cd common
          rm -rf out .config
          make ARCH=arm64 mrproper
          
          # Ρυθμίσεις για τη διόρθωση του Bootloop (Δοκιμή 1250)
          echo "CONFIG_IKCONFIG=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IKCONFIG_PROC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_FRAME_WARN=2048" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          
          # Διαχείριση Modules για AOSP ROMs
          echo "CONFIG_MODULES=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MODVERSIONS=y" >> arch/arm64/configs/gki_defconfig
          echo "# CONFIG_MODULE_SIG is not set" >> arch/arm64/configs/gki_defconfig
          echo "# CONFIG_ANDROID_DEBUG_KINFO is not set" >> arch/arm64/configs/gki_defconfig
          
          # Δικαιώματα εκτέλεσης στα binaries του Clang
          chmod -R +x ../clang/
          
          CLANG_BIN=$(find ../clang -type d -name "bin" | head -n 1)
          export PATH="$CLANG_BIN:$PATH"
          
          mkdir -p out
          ARCH=arm64 ./scripts/kconfig/merge_config.sh \
            -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/garnet_GKI.config

      - name: 🔨 Compile Valid Image
        run: |
          cd common
          
          # Ορισμός του σωστού φακέλου bin του Clang 21
          CLANG_PATH=$(realpath ../clang/bin)
          export PATH="$CLANG_PATH:$PATH"
          
          # ΑΛΛΑΓΗ: Ενεργοποιούμε το Thin LTO αντί για το Full LTO που προκαλεί το instant reset
          sed -i 's/CONFIG_LTO_CLANG_FULL=y/# CONFIG_LTO_CLANG_FULL is not set/g' out/.config
          echo "CONFIG_LTO_CLANG_THIN=y" >> out/.config
          echo "CONFIG_ARM64_LSE_ATOMICS=y" >> out/.config
          
          # 2. Εκτέλεση olddefconfig
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC="$CLANG_PATH/clang" \
            LLVM="$CLANG_PATH/" \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            olddefconfig

          # 3. Εκτέλεση Image Build με παράκαμψη του Stack Frame Error στο KCFLAGS
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC="$CLANG_PATH/clang" \
            LLVM="$CLANG_PATH/" \
            LLVM_IAS=1 \
            OBJCOPY="$CLANG_PATH/llvm-objcopy" \
            OBJDUMP="$CLANG_PATH/llvm-objdump" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS="-Wno-error -Wno-error=frame-larger-than=" \
            Image

      - name: 📦 Prepare AnyKernel3
        id: prepare_ak3
        run: |
          git clone --depth=1 "https://github.com/osm0sis/AnyKernel3" AnyKernel3
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh

          AK3_NAME=Valid_kernel_5.10.236-AnyKernel3.zip
          #zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_ak3.outputs.ak3name }}
          path: ${{ github.workspace }}/AnyKernel3/**
          if-no-files-found: ignore
          compression-level: 9
