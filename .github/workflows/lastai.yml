name: 🚀 Valid Garnet Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 libelf-dev

      - name: 🛠️ Download Lightweight AOSP Clang
        run: |
          mkdir -p clang
          cd clang
          # Λήψη του ελαφριού prebuilt αρχείου
          wget "https://github.com/userariii/AOSP-clang/releases/download/clang-r530567/clang-r530567.tar.gz"
          # Αποσυμπίεση των εργαλείων μεταγλώττισης
          tar -xf clang-r530567.tar.gz
          rm clang-r530567.tar.gz

      - name: 🌲 Clone Kernel Source
        run: |
          git clone --depth=1 "https://github.com/UserXP-web/Zen-ItsuKernel-Garnet" -b Zen-Itsu-Garnet source

      - name: 🧩 Merge Defconfigs
        run: |
          cd source
          ARCH=arm64 ./scripts/kconfig/merge_config.sh \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/garnet_GKI.config

      - name: 🔨 Compile Valid Image
        run: |
          cd source
          export PATH="$(pwd)/../clang/linux-x86/clang-r530567/bin:$PATH"
          
          sed -i 's/CONFIG_ANDROID_KABI_PROTECT=y/CONFIG_ANDROID_KABI_PROTECT=n/g' .config
          
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            olddefconfig

          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            Image

      - name: 📦 Prepare AnyKernel3
        run: |
          git clone --depth=1 "/osm0sis/AnyKernel3" AnyKernel3
          cp source/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh

      - name: 📤 Upload Valid Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Valid-Garnet-Kernel
          path: AnyKernel3/*
