name: CI

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/UserXP-web/android_kernel_xiaomi_sm7435
          kernel-branch: lineage-23.2
          config: gki_defconfig
          arch: arm64
          aosp-gcc: true          
          android-version: 12
          #Android version for AOSP toolchain (Ignore if you want to use latest AOSP clang or use other clang)
          aosp-clang: true
          aosp-clang-version: r584948 # r383902
          anykernel3: true
          anykernel3-url: https://github.com/WildPlusKernel/AnyKernel3
